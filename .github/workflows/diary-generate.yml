name: Generate Diary SVG

on:
  push:
    paths:
      - 'diary.json'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate SVG
        run: python generate_diary_svg.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diary.svg
          git diff --cached --quiet || git commit -m "🔄 Auto-update diary.svg"
          git push

        <text class="text" x="14" y="105">set交并集做社交关系运算</text>
        <text class="text" x="14" y="124">集中式session存储</text>
        <text class="tag" x="14" y="161">Redis · 其他使用场景</text>
      </g>
    </g>
  </g>
  <clipPath id="clip1"><rect x="0" y="198" width="850" height="188" /></clipPath>
  <g clip-path="url(#clip1)">
    <g class="row1">
      <g transform="translate(0, 203)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">数据在缓存和DB中都不存在</text>
        <text class="text" x="14" y="67">每次请求都穿透到数据库</text>
        <text class="text" x="14" y="86">解决: 缓存空值 + 布隆过滤器</text>
        <text class="text" x="14" y="105">布隆过滤器用bit数组+k个哈希</text>
        <text class="text" x="14" y="124">说不存在一定不存在(可能误判)</text>
        <text class="tag" x="14" y="161">Redis · 缓存穿透</text>
      </g>
      <g transform="translate(260, 203)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">分布式下本地mutex跨机器不可见</text>
        <text class="text" x="14" y="67">用Redis做共享锁: SET NX PX</text>
        <text class="text" x="14" y="86">释放用Lua脚本保证原子性</text>
        <text class="text" x="14" y="105">先GET比对uuid再DEL，防误删</text>
        <text class="tag" x="14" y="161">Redis · 分布式锁基础</text>
      </g>
      <g transform="translate(520, 203)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">AOF: 记录每条写命令到日志</text>
        <text class="text" x="14" y="67">fsync策略: always/everysec/no</text>
        <text class="text" x="14" y="86">文件膨胀→AOF重写(从内存生成)</text>
        <text class="text" x="14" y="105">fork子进程，用最少命令表达数据</text>
        <text class="tag" x="14" y="161">Redis · 持久化 AOF</text>
      </g>
      <g transform="translate(780, 203)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">独立监控进程，盯master状态</text>
        <text class="text" x="14" y="67">SDOWN(主观)→ODOWN(客观,过半)</text>
        <text class="text" x="14" y="86">Raft选举leader执行故障转移</text>
        <text class="text" x="14" y="105">自动提升slave为新master</text>
        <text class="text" x="14" y="124">局限: 写入单点，数据量受限单机</text>
        <text class="tag" x="14" y="161">Redis · 哨兵 Sentinel</text>
      </g>
      <g transform="translate(1040, 203)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>

<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <style>
        /* 亮色主题卡片和边框 */
        .box { fill: #f6f8fa; stroke: #d1d5da; stroke-width: 1.5px; rx: 8px; }
        /* 深色主题文本 */
        .text { font-family: 'Fira Code', monospace, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #24292e; font-weight: bold; }
        /* 亮色日期蓝色 */
        .date { font-family: 'Fira Code', monospace; font-size: 12px; fill: #0366d6; }
    </style>
    
    <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
    
    <g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-255 0" begin="0s" dur="30s" repeatCount="indefinite" />
        
        <g>
            <rect x="0" y="20" width="240" height="110" class="box"/>
<text x="15" y="50" class="date">[2026-03-18]</text>
<text x="15" y="80" class="text">test3</text>

            <rect x="0" y="150" width="240" height="110" class="box"/>
<text x="15" y="180" class="date">[2026-03-18]</text>
<text x="15" y="210" class="text">test1</text>

            <rect x="0" y="280" width="220" height="110" class="box"/>
<text x="15" y="310" class="date">[2026-03-17]</text>
<text x="15" y="340" class="text">test</text>

        </g>
        
        <g transform="translate(255, 0)">
            <rect x="0" y="20" width="240" height="110" class="box"/>
<text x="15" y="50" class="date">[2026-03-18]</text>
<text x="15" y="80" class="text">test3</text>

            <rect x="0" y="150" width="240" height="110" class="box"/>
<text x="15" y="180" class="date">[2026-03-18]</text>
<text x="15" y="210" class="text">test1</text>

            <rect x="0" y="280" width="220" height="110" class="box"/>
<text x="15" y="310" class="date">[2026-03-17]</text>
<text x="15" y="340" class="text">test</text>

        </g>
    </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="584" viewBox="0 0 850 584">
  <defs>
    <style>
      @keyframes row0 {
        0% { transform: translateX(0px); }
        100% { transform: translateX(-1300px); }
      }
      .row0 { animation: row0 28s linear infinite; }
      @keyframes row1 {
        0% { transform: translateX(-120px); }
        100% { transform: translateX(-1160px); }
      }
      .row1 { animation: row1 34s linear infinite; }
      @keyframes row2 {
        0% { transform: translateX(-60px); }
        100% { transform: translateX(-1100px); }
      }
      .row2 { animation: row2 31s linear infinite; }
      .card {
        rx: 10; ry: 10;
        fill: #ffffff;
        stroke: #d0d7de;
        stroke-width: 1;
      }
      .date {
        font-family: 'Segoe UI', Ubuntu, sans-serif;
        font-size: 11px;
        fill: #0969da;
      }
      .text {
        font-family: 'Segoe UI', Ubuntu, sans-serif;
        font-size: 12.5px;
        fill: #1f2328;
      }
      .tag {
        font-family: 'Segoe UI', Ubuntu, sans-serif;
        font-size: 10px;
        fill: #656d76;
      }
    </style>
    <linearGradient id="fade-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="5%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="95%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="850" height="584" rx="12" fill="#ffffff" />

  <clipPath id="clip0"><rect x="0" y="10" width="850" height="188" /></clipPath>
  <g clip-path="url(#clip0)">
    <g class="row0">
      <g transform="translate(0, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">Redis作为缓存层拦截请求</text>
        <text class="text" x="14" y="67">命中直接返回，未命中查DB</text>
        <text class="text" x="14" y="86">查完写回Redis，下次命中</text>
        <text class="text" x="14" y="105">内存级速度，保护数据库</text>
        <text class="tag" x="14" y="161">Redis · 缓存基本流程</text>
      </g>
      <g transform="translate(260, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">大量key同时过期或Redis宕机</text>
        <text class="text" x="14" y="67">海量请求失去缓存保护</text>
        <text class="text" x="14" y="86">解决: TTL加随机值错开过期</text>
        <text class="text" x="14" y="105">Redis高可用集群防宕机</text>
        <text class="text" x="14" y="124">本地缓存+DB限流做兜底</text>
        <text class="tag" x="14" y="161">Redis · 缓存雪崩</text>
      </g>
      <g transform="translate(520, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">RDB: 定时全量快照，二进制文件</text>
        <text class="text" x="14" y="67">fork子进程+COW，不阻塞主线程</text>
        <text class="text" x="14" y="86">恢复极快，但可能丢快照间数据</text>
        <text class="tag" x="14" y="161">Redis · 持久化 RDB</text>
      </g>
      <g transform="translate(780, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">1主多从: master写，slave读</text>
        <text class="text" x="14" y="67">全量同步: RDB快照+增量命令</text>
        <text class="text" x="14" y="86">部分重同步: offset+repl_backlog</text>
        <text class="text" x="14" y="105">局限: master挂了需手动切换</text>
        <text class="tag" x="14" y="161">Redis · 主从复制</text>
      </g>
      <g transform="translate(1040, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">list LPUSH/BRPOP做消息队列</text>
        <text class="text" x="14" y="67">zset做实时排行榜</text>
        <text class="text" x="14" y="86">INCR做计数器/限流</text>
        <text class="text" x="14" y="105">set交并集做社交关系运算</text>
        <text class="text" x="14" y="124">集中式session存储</text>
        <text class="tag" x="14" y="161">Redis · 其他使用场景</text>
      </g>
      <g transform="translate(1300, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">Redis作为缓存层拦截请求</text>
        <text class="text" x="14" y="67">命中直接返回，未命中查DB</text>
        <text class="text" x="14" y="86">查完写回Redis，下次命中</text>

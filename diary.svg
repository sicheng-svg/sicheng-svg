  <clipPath id="clip2"><rect x="0" y="386" width="850" height="188" /></clipPath>
  <g clip-path="url(#clip2)">
    <g class="row2">
      <g transform="translate(0, 391)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">热点key突然过期</text>
        <text class="text" x="14" y="67">大量并发同时查同一个key</text>
        <text class="text" x="14" y="86">全部未命中，涌向数据库</text>
        <text class="text" x="14" y="105">解决: 互斥锁只放一个请求查DB</text>
        <text class="text" x="14" y="124">或热点数据永不过期+后台更新</text>
        <text class="tag" x="14" y="161">Redis · 缓存击穿</text>
      </g>
      <g transform="translate(260, 391)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">看门狗: 后台线程定期给锁续期</text>
        <text class="text" x="14" y="67">业务完成停止续期，崩溃则自动过期</text>
        <text class="text" x="14" y="86">RedLock: 5个独立实例，过半成功</text>
        <text class="text" x="14" y="105">解决主从切换丢锁问题(有争议)</text>
        <text class="text" x="14" y="124">强一致场景考虑ZK/etcd</text>
        <text class="tag" x="14" y="161">Redis · 分布式锁进阶</text>
      </g>
      <g transform="translate(520, 391)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">重写时前半部分用RDB格式写快照</text>
        <text class="text" x="14" y="67">后半部分用AOF记录重写期间增量</text>
        <text class="text" x="14" y="86">恢复: 加载RDB(快)+回放AOF(少)</text>
        <text class="text" x="14" y="105">兼顾恢复速度和数据完整性</text>
        <text class="tag" x="14" y="161">Redis · 混合持久化</text>
      </g>
      <g transform="translate(780, 391)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">16384个哈希槽分配到多master</text>
        <text class="text" x="14" y="67">CRC16(key)%16384路由到对应节点</text>
        <text class="text" x="14" y="86">每个master挂slave做高可用</text>
        <text class="text" x="14" y="105">Gossip协议自治，无需哨兵</text>
        <text class="text" x="14" y="124">跨槽操作受限，用hash tag解决</text>
        <text class="tag" x="14" y="161">Redis · Cluster 集群</text>
      </g>

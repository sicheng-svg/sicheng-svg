        <text class="tag" x="14" y="161">Redis · 主从复制</text>
      </g>
      <g transform="translate(2340, 15)">
        <rect class="card" width="240" height="173" />
        <text class="date" x="14" y="24">2026-03-26</text>
        <text class="text" x="14" y="48">list LPUSH/BRPOP做消息队列</text>
